<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Hexagon shape with HE monogram -->
  <defs>
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hexagon -->
  <polygon points="50,10 90,35 90,85 50,110 10,85 10,35" fill="url(#hexGradient)" stroke="none"/>
  
  <!-- HE text -->
  <text x="50" y="65" font-family="IBM Plex Serif, serif" font-size="40" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">HE</text>
</svg>
